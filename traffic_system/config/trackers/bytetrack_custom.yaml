# Custom ByteTrack configuration for Traffic Monitoring System
# Based on: https://github.com/ultralytics/ultralytics/blob/main/ultralytics/cfg/trackers/bytetrack.yaml

tracker_type: bytetrack

# Tracking thresholds
track_high_thresh: 0.5    # Threshold for first association (high confidence detections)
track_low_thresh: 0.1     # Threshold for second association (low confidence detections)
new_track_thresh: 0.6     # Threshold to initialize a new track
track_buffer: 30          # Frames to keep lost tracks before deletion

# Matching
match_thresh: 0.8         # Threshold for matching tracks
fuse_score: True          # Fuse confidence score with IoU distance
